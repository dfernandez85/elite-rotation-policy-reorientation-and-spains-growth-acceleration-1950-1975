name: Reproducibility Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: renv
          use-public-rspm: true

      - name: Restore renv environment
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Run full journal pipeline
        shell: pwsh
        env:
          RENV_CONFIG_AUTOLOADER_ENABLED: FALSE
        run: |
          Rscript main.R

      - name: Locate latest session
        id: session
        shell: pwsh
        run: |
          $sessionDir = Get-ChildItem "output/sessions" | Sort-Object Name | Select-Object -Last 1 -ExpandProperty FullName
          "path=$sessionDir" >> $env:GITHUB_OUTPUT

      - name: Upload session artifact
        uses: actions/upload-artifact@v4
        with:
          name: journal-output-session
          path: ${{ steps.session.outputs.path }}
          if-no-files-found: error
